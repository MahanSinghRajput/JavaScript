<script>
    const requestURL = "https://api.github.com/users/MahanSinghRajput"
    const xhr = new XMLHttpRequest()
    xhr.open('GET', requestURL)
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState)
        if(xhr.readyState === 4){
            const data = JSON.parse(this.responseText)
            //you get string as output from an URL hence we converted it
            console.log(data.followers)
        }
    } //for continuous track
    xhr.send() //call made
</script>
